name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine version
        id: version
        run: python3 .github/scripts/determine_version.py

      - name: No releasable commits
        if: steps.version.outputs.should_release != 'true'
        run: echo "Nothing to release. Skipping."

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.should_release == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.version.outputs.should_release == 'true'
        with:
          node-version: 20

      - name: Bump package.json version
        if: steps.version.outputs.should_release == 'true'
        run: |
          tmp=$(mktemp)
          jq --arg v "${{ steps.version.outputs.new_version }}" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

      - name: Commit and tag (detached, off main)
        if: steps.version.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.new_version }}"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Build release artifact
        if: steps.version.outputs.should_release == 'true'
        run: bash scripts/build_release.sh

      - name: Publish release
        if: steps.version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.new_version }}"
          name: "v${{ steps.version.outputs.new_version }}"
          body: ${{ steps.version.outputs.changelog }}
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
